<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Admin</title><link rel="stylesheet" href="../assets/piano-theme.css"></head><body><div class="app"><div class="app-brand"><div class="p">P</div><div class="name">PIANO DERİ</div><div class="sub">ADMİN PANELİ</div></div><div id="apiWarning" class="notice" style="display:none"></div><section id="pinSection" class="panel-card" style="max-width:520px;margin:auto"><h1>Admin Girişi</h1><input id="adminPin" type="password" placeholder="PIN"><br><br><button class="btn-gold" onclick="adminLogin()">GİRİŞ YAP</button></section><section id="adminPanel" style="display:none"><div class="panel-card"><h2 id="hotelFormTitle">Yeni Otel Ekle</h2><input type="hidden" id="hotelId"><div class="grid grid5"><input id="hotelName" placeholder="Otel adı"><input id="agentCode" placeholder="ACENTAKOD"><input id="hotelCode" placeholder="Kullanıcı kodu"><input id="hotelPassword" placeholder="Şifre"><select id="hotelStatus"><option>ACTIVE</option><option>PASSIVE</option></select></div><br><button class="btn-gold" onclick="saveHotel()">OTELİ KAYDET</button><button class="btn-dark" onclick="clearHotelForm()">TEMİZLE</button></div><div class="panel-card table-wrap"><h2>Oteller</h2><table><thead><tr><th>Otel</th><th>ACENTAKOD</th><th>Kod</th><th>Şifre</th><th>Durum</th><th>İşlemler</th></tr></thead><tbody id="hotelTable"></tbody></table></div></section></div><script src="../config/config.js"></script><script src="../assets/common.js"></script><script>
showApiWarning();function adminLogin(){if(adminPin.value===ADMIN_PIN)openAdmin();else alert("Admin PIN hatalı")}function openAdmin(){pinSection.style.display="none";adminPanel.style.display="block";loadHotels()}async function loadHotels(){let h=await apiGet("getHotels");hotelTable.innerHTML=h.map(x=>`<tr><td>${esc(x.hotel)}</td><td>${esc(x.agentCode||"")}</td><td>${esc(x.code)}</td><td>••••••</td><td>${esc(x.status)}</td><td><button class="btn-blue" onclick='editHotel(${JSON.stringify(x)})'>Düzenle</button> <button class="btn-red" onclick="cancelHotel('${x.id}')">İptal/Sil</button></td></tr>`).join("")}function editHotel(h){hotelFormTitle.innerText="Otel Düzelt";hotelId.value=h.id;hotelName.value=h.hotel;agentCode.value=h.agentCode||"";hotelCode.value=h.code;hotelPassword.value=h.password;hotelStatus.value=h.status}function clearHotelForm(){hotelFormTitle.innerText="Yeni Otel Ekle";hotelId.value="";hotelName.value="";agentCode.value="";hotelCode.value="";hotelPassword.value="";hotelStatus.value="ACTIVE"}async function saveHotel(){let r=await apiPost(hotelId.value?"updateHotel":"addHotel",{id:hotelId.value,hotel:hotelName.value,agentCode:agentCode.value,code:hotelCode.value,password:hotelPassword.value,status:hotelStatus.value});if(r.success){clearHotelForm();loadHotels()}else alert("Hata")}async function cancelHotel(id){if(confirm("Otel tamamen silinsin mi?")){let r=await apiGet("cancelHotel",{id});if(r.success)loadHotels();else alert("Silinemedi")}}</script></body></html>
