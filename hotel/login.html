<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Otel Giriş</title><link rel="stylesheet" href="../assets/piano-theme.css"></head><body><div class="app" style="max-width:640px;display:grid;place-items:center"><div style="width:100%"><div class="app-brand"><div class="p">P</div><div class="name">PIANO DERİ</div><div class="sub">OTEL PANELİ</div></div><div id="apiWarning" class="notice" style="display:none"></div><div class="panel-card"><h1>Otel Girişi</h1><input id="code" placeholder="OTEL KODU"><br><br><input id="password" type="password" placeholder="ŞİFRE"><br><br><button class="btn-gold" onclick="login()">GİRİŞ YAP</button></div></div></div><script src="../config/config.js"></script><script src="../assets/common.js"></script><script>showApiWarning();async function login(){let r=await apiGet("login",{code:code.value.trim(),password:password.value.trim()});if(r.success){localStorage.setItem("hotel",r.hotel);localStorage.setItem("hotelCode",r.code);location.href="mobile-hotel-panel.html"}else alert(r.message||"Hatalı giriş")}</script></body></html>
