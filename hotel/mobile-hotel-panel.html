<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Otel Panel</title><link rel="stylesheet" href="../assets/piano-theme.css"></head><body><div class="app" style="max-width:900px"><div class="app-brand"><div class="p">P</div><div class="name">PIANO DERİ</div><div class="sub">OTEL PANELİ</div></div><div id="successBox" class="ok" style="display:none"></div><div class="panel-card"><h2>Hoş geldiniz, <span id="hotelName"></span></h2><p>Kod: <span id="hotelCode"></span></p></div><div class="panel-card"><div class="tab-row"><button class="btn-gold" onclick="showEntry()">Yeni Rezervasyon</button><button class="btn-dark" onclick="showList()">Rezervasyonlarım</button></div><section id="entryPage"><h1 id="formTitle">Rezervasyon Ekle</h1><input type="hidden" id="editingId"><div class="grid grid2"><input type="date" id="date"><input type="time" id="time"><input type="number" id="adult" value="2"><input type="number" id="child" value="0"></div><br><select id="nation"><option>ALBENYA</option><option>ALMAN</option><option>ARNAVUT</option><option>AVRUPA</option><option>AZERÝ</option><option>BELARUS</option><option>BOSNA</option><option>BULGARISTAN</option><option>CEK</option><option>CERKEZ</option><option>ÇEÇEN</option><option>ÇÝN</option><option>DAGISTAN</option><option>ERMENISTAN</option><option>ESTONYA</option><option>FRANSA</option><option>GURCU</option><option>INGILIZ</option><option>IRAK</option><option>ISVICRE</option><option>ÝRAN</option><option>JAPON</option><option>KAFKAS</option><option>KAZAK</option><option>KIRGIZ</option><option>KORE</option><option>KÜRT</option><option>LEHÝSTAN</option><option>LITVANYA</option><option>LÝTVANYA</option><option>MOLDOVYA</option><option>OZBEK</option><option>POLONYA</option><option>ROMANYA</option><option>RUS</option><option>SIRBISTAN</option><option>SLOVAK</option><option>TACIK</option><option>TATAR</option><option>TURKMEN</option><option>TÜRK</option><option>UKRAÝN</option></select><br><br><textarea id="notes" placeholder="Not"></textarea><br><br><button id="saveBtn" class="btn-gold" onclick="saveReservation()">REZERVASYONU KAYDET</button><button id="cancelEditBtn" class="btn-dark" style="display:none" onclick="resetForm()">Düzenlemeyi İptal Et</button></section><section id="listPage" style="display:none"><h1>Rezervasyonlarım</h1><input type="date" id="listDate" onchange="loadReservations()"><br><br><div id="reservationList"></div></section></div></div><script src="../config/config.js"></script><script src="../assets/common.js"></script><script>
const hotel=localStorage.getItem("hotel"),code=localStorage.getItem("hotelCode");if(!hotel)location.href="login.html";const today=new Date().toISOString().slice(0,10);hotelName.innerText=hotel;hotelCode.innerText=code;date.value=today;listDate.value=today;time.value="10:30";function showSuccess(m){successBox.innerText=m;successBox.style.display="block";setTimeout(()=>successBox.style.display="none",3500)}function showEntry(){entryPage.style.display="block";listPage.style.display="none"}function showList(){entryPage.style.display="none";listPage.style.display="block";loadReservations()}function resetForm(){editingId.value="";formTitle.innerText="Rezervasyon Ekle";saveBtn.innerText="REZERVASYONU KAYDET";cancelEditBtn.style.display="none";date.value=today;time.value="10:30";adult.value=2;child.value=0;nation.value="RUS";notes.value=""}async function saveReservation(){let b={id:editingId.value,date:date.value,time:time.value,hotel,adult:adult.value,child:child.value,nation:nation.value,notes:notes.value,status:"PENDING"};let r=editingId.value?await apiPost("updateReservation",b):await apiPost("addReservation",b);if(r.success){showSuccess(editingId.value?"Rezervasyon güncellendi.":"Rezervasyon kaydedildi.");listDate.value=b.date;resetForm();await loadReservations();if(editingId.value)showList()}else alert("Hata")}async function loadReservations(){let d=await apiGet("getReservations",{date:listDate.value,hotel});reservationList.innerHTML=d.length?d.map(renderCard).join(""):"<p>Kayıt yok.</p>"}function cls(s){return s==="CANCELLED"?"cancelled":s==="UPDATED"?"updated":"pending"}function renderCard(r){let dis=r.status==="CANCELLED"?"disabled":"";return `<div class="res-card ${r.status==="CANCELLED"?"row-cancelled":""}"><div class="res-title">${r.time} — ${esc(r.hotel)}</div><div class="res-meta">${r.adult||0} yetişkin / ${r.child||0} çocuk<br>Uyruk: ${esc(r.nation||"")}<br>Not: ${esc(r.notes||"")}<br>Durum: <span class="badge ${cls(r.status)}">${r.status||"PENDING"}</span></div><div class="res-actions"><button class="btn-blue" ${dis} onclick='editReservation(${JSON.stringify(r)})'>Düzelt</button><button class="btn-red" ${dis} onclick="cancelReservation('${r.id}')">İptal</button></div></div>`}function editReservation(r){editingId.value=r.id;date.value=r.date;time.value=r.time;adult.value=r.adult||0;child.value=r.child||0;nation.value=r.nation||"RUS";notes.value=r.notes||"";formTitle.innerText="Rezervasyon Düzelt";saveBtn.innerText="GÜNCELLE";cancelEditBtn.style.display="inline-block";showEntry()}async function cancelReservation(id){if(confirm("Bu rezervasyon iptal edilsin mi?")){let r=await apiGet("cancelReservation",{id});if(r.success){showSuccess("Rezervasyon iptal edildi.");loadReservations()}}}loadReservations();
</script></body></html>
