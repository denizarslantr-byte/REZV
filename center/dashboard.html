<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Piano Deri Merkez V6</title><link rel="stylesheet" href="../assets/piano-theme.css"></head>
<body><div class="app"><div class="app-brand"><div class="p">P</div><div class="name">PIANO DERİ</div><div class="sub">MERKEZ OPERASYON EKRANI</div></div><div id="apiWarning" class="notice" style="display:none"></div><div id="successBox" class="ok" style="display:none"></div>
<div class="center-layout"><aside class="side-menu panel-card"><button class="btn-gold" onclick="showSection('home')">Ana Ekran</button><button class="btn-dark" onclick="showSection('manual')">Elle Rezervasyon</button><button class="btn-dark" onclick="showSection('reports')">Raporlar</button><button class="btn-dark" onclick="showSection('staff')">Personel</button><button class="btn-dark" onclick="showSection('off')">İzinli Girişi</button><button class="btn-dark" onclick="location.href='../admin/admin.html'">Admin</button></aside>
<main>
<section id="home" class="section active"><div class="panel-card topbar"><div><label>Tarih Seç</label><input type="date" id="datePicker" onchange="loadAll()"></div><button class="btn-gold" onclick="exportTodayXls()">Dışa Aktar</button></div><div id="reservationList"></div></section>
<section id="manual" class="section"><div class="panel-card"><h2 id="manualTitle">Elle Rezervasyon</h2><input type="hidden" id="editResId"><div class="grid grid5"><input id="centerHotel" placeholder="Otel"><input type="date" id="centerDate"><input type="time" id="centerTime"><input type="time" id="centerExitTime"><select id="centerNation"><option>ALBENYA</option><option>ALMAN</option><option>ARNAVUT</option><option>AVRUPA</option><option>AZERÝ</option><option>BELARUS</option><option>BOSNA</option><option>BULGARISTAN</option><option>CEK</option><option>CERKEZ</option><option>ÇEÇEN</option><option>ÇÝN</option><option>DAGISTAN</option><option>ERMENISTAN</option><option>ESTONYA</option><option>FRANSA</option><option>GURCU</option><option>INGILIZ</option><option>IRAK</option><option>ISVICRE</option><option>ÝRAN</option><option>JAPON</option><option>KAFKAS</option><option>KAZAK</option><option>KIRGIZ</option><option>KORE</option><option>KÜRT</option><option>LEHÝSTAN</option><option>LITVANYA</option><option>LÝTVANYA</option><option>MOLDOVYA</option><option>OZBEK</option><option>POLONYA</option><option>ROMANYA</option><option>RUS</option><option>SIRBISTAN</option><option>SLOVAK</option><option>TACIK</option><option>TATAR</option><option>TURKMEN</option><option>TÜRK</option><option>UKRAÝN</option></select></div><br><div class="grid grid4"><input type="number" id="centerAdult" value="2"><input type="number" id="centerChild" value="0"><input id="centerKart" placeholder="KART"><input id="centerAyak" placeholder="AYAK"></div><br><textarea id="centerNotes" placeholder="Not"></textarea><br><br><button class="btn-gold" onclick="saveCenterReservation()">KAYDET</button><button class="btn-dark" onclick="clearManualForm()">TEMİZLE</button></div></section>
<section id="reports" class="section"><div class="panel-card"><h2>Raporlar</h2><div class="grid grid4"><button class="btn-dark" onclick="setReportRange('today')">Bugün</button><button class="btn-dark" onclick="setReportRange('week')">Bu Hafta</button><button class="btn-dark" onclick="setReportRange('month')">Bu Ay</button><button class="btn-gold" onclick="loadReports()">Raporu Oluştur</button></div><br><div class="grid grid2"><input type="date" id="reportStart"><input type="date" id="reportEnd"></div></div><div id="reportOut"></div></section>
<section id="staff" class="section"><div class="panel-card"><h2>Personel Yönetimi</h2><div class="grid grid2"><input id="staffName" placeholder="Personel adı"><button class="btn-gold" onclick="addStaff()">Personel Ekle</button></div><br><div id="allStaffList"></div></div></section>
<section id="off" class="section"><div class="panel-card"><h2>İzinli Personel Girişi</h2><label>İzin Tarihi</label><input type="date" id="offDate" onchange="renderStaff()"><br><br><label>Personel</label><select id="offStaffSelect"></select><br><br><button class="btn-gold" onclick="makeOff(true)">İzinli Yap</button><button class="btn-dark" onclick="makeOff(false)">İzni Kaldır</button></div></section>
</main><aside><div class="panel-card"><h2>Personel Durumu</h2><p>Seçilen tarih: <b id="selectedDateLabel"></b></p><h3>Boşta Olanlar</h3><div id="freeStaffList" class="staff-list"></div><h3>Programda Olanlar</h3><div id="busyStaffList" class="staff-list"></div><h3>İzinli Olanlar</h3><div id="offStaffList" class="staff-list"></div></div></aside></div></div>
<script src="../config/config.js"></script><script src="../assets/common.js"></script><script>
showApiWarning();let reservations=[],staff=[];const today=new Date().toISOString().slice(0,10);datePicker.value=today;centerDate.value=today;offDate.value=today;centerTime.value="10:30";reportStart.value=today;reportEnd.value=today;
function showSuccess(m){successBox.innerText=m;successBox.style.display="block";setTimeout(()=>successBox.style.display="none",3000)}
function showSection(id){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active")}
async function loadAll(){reservations=await apiGet("getReservations",{date:datePicker.value});staff=await apiGet("getStaff");selectedDateLabel.innerText=datePicker.value;renderReservations();renderStaff()}
function isOff(s,d=datePicker.value){return String(s.offDates||"").split(",").map(x=>x.trim()).filter(Boolean).includes(d)}
function busySet(){let u=new Set();reservations.forEach(r=>{if(r.status!=="CANCELLED"&&String(r.cikti).toUpperCase()!=="TRUE")[r.staff1,r.staff2,r.staff3,r.staff4].filter(Boolean).forEach(x=>u.add(x))});return u}
function freeStaff(){let u=busySet();return staff.filter(s=>s.status==="ACTIVE"&&!isOff(s)&&!u.has(s.name))}
function staffOptions(cur=""){let n=freeStaff().map(s=>s.name);if(cur&&!n.includes(cur))n.unshift(cur);return '<option value="">Boş</option>'+n.map(x=>`<option ${x===cur?'selected':''}>${esc(x)}</option>`).join("")}
function renderStaff(){let u=busySet(),free=freeStaff(),busy=staff.filter(s=>u.has(s.name)),off=staff.filter(s=>isOff(s));freeStaffList.innerHTML=free.length?free.map(s=>`<span class="staff-pill staff-free">${esc(s.name)}</span>`).join(""):"Boşta personel yok.";busyStaffList.innerHTML=busy.length?busy.map(s=>`<span class="staff-pill staff-busy">${esc(s.name)}</span>`).join(""):"Programda personel yok.";offStaffList.innerHTML=off.length?off.map(s=>`<span class="staff-pill staff-off">${esc(s.name)}</span>`).join(""):"İzinli personel yok.";allStaffList.innerHTML=staff.length?staff.map(s=>`<div class="res-card"><b>${esc(s.name)}</b> ${isOff(s)?'<span class="badge off">İZİNLİ</span>':''} <button class="btn-red" onclick="deleteStaff('${s.id}')">Sil</button></div>`).join(""):"Personel yok.";offStaffSelect.innerHTML=staff.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join("")}
async function addStaff(){if(!staffName.value.trim())return alert("Personel adı yazın");await apiPost("addStaff",{name:staffName.value.trim()});staffName.value="";loadAll()}
async function deleteStaff(id){if(confirm("Personel silinsin mi?")){await apiGet("deleteStaff",{id});loadAll()}}
async function makeOff(off){if(!offStaffSelect.value)return alert("Personel seçin");await apiPost("setStaffOff",{id:offStaffSelect.value,date:offDate.value,off});datePicker.value=offDate.value;showSuccess(off?"İzinli kaydedildi":"İzin kaldırıldı");loadAll()}
function rowClass(r){if(r.status==="CANCELLED")return"row-cancelled";if(String(r.cikti).toUpperCase()==="TRUE")return"row-exited";if(String(r.girdi).toUpperCase()==="TRUE")return"row-entered";return""}
function badge(r){if(r.status==="CANCELLED")return'<span class="badge cancelled">İPTAL</span>';if(String(r.cikti).toUpperCase()==="TRUE")return'<span class="badge exited">ÇIKTI</span>';if(String(r.girdi).toUpperCase()==="TRUE")return'<span class="badge entered">GİRDİ</span>';return `<span class="badge pending">${r.status||"PENDING"}</span>`}
function renderReservations(){let g={};reservations.forEach(r=>{if(!g[r.time])g[r.time]=[];g[r.time].push(r)});reservationList.innerHTML=Object.keys(g).length?Object.keys(g).sort().map(t=>`<div class="time-title">${t}</div><div class="panel-card table-wrap"><table><thead><tr><th>Girdi</th><th>Çıktı</th><th>Tarih</th><th>Giriş</th><th>Çıkış</th><th>Otel</th><th>Adult</th><th>Child</th><th>Uyruk</th><th>Not</th><th>Status</th><th>Kart</th><th>Ayak</th><th>T1</th><th>T2</th><th>T3</th><th>T4</th><th>İşlem</th></tr></thead><tbody>${g[t].map(r=>`<tr class="${rowClass(r)}"><td><input type="checkbox" ${String(r.girdi).toUpperCase()==="TRUE"?"checked":""} onchange="updateGirdi('${r.id}',this.checked)" ${r.status==="CANCELLED"?"disabled":""}></td><td><input type="checkbox" ${String(r.cikti).toUpperCase()==="TRUE"?"checked":""} onchange="updateCikti('${r.id}',this.checked)" ${r.status==="CANCELLED"?"disabled":""}></td><td>${r.date}</td><td>${r.time}</td><td><input type="time" class="compact-input" id="exit_${r.id}" value="${r.exitTime||""}" ${r.status==="CANCELLED"?"disabled":""}></td><td>${esc(r.hotel)}</td><td>${r.adult}</td><td>${r.child}</td><td>${esc(r.nation)}</td><td>${esc(r.notes||"")}</td><td>${badge(r)}</td><td><input class="compact-input" id="kart_${r.id}" value="${esc(r.kart||"")}" ${r.status==="CANCELLED"?"disabled":""}></td><td><input class="compact-input" id="ayak_${r.id}" value="${esc(r.ayak||"")}" ${r.status==="CANCELLED"?"disabled":""}></td><td><select class="staff-select" id="s1_${r.id}" ${r.status==="CANCELLED"?"disabled":""}>${staffOptions(r.staff1)}</select></td><td><select class="staff-select" id="s2_${r.id}" ${r.status==="CANCELLED"?"disabled":""}>${staffOptions(r.staff2)}</select></td><td><select class="staff-select" id="s3_${r.id}" ${r.status==="CANCELLED"?"disabled":""}>${staffOptions(r.staff3)}</select></td><td><select class="staff-select" id="s4_${r.id}" ${r.status==="CANCELLED"?"disabled":""}>${staffOptions(r.staff4)}</select></td><td class="action-cell"><button class="btn-dark" onclick="saveOps('${r.id}')" ${r.status==="CANCELLED"?"disabled":""}>Kaydet</button> <button class="btn-blue" onclick='editCenter(${JSON.stringify(r)})' ${r.status==="CANCELLED"?"disabled":""}>Düzelt</button> <button class="btn-red" onclick="cancelReservation('${r.id}')" ${r.status==="CANCELLED"?"disabled":""}>İptal</button></td></tr>`).join("")}</tbody></table></div>`).join(""):`<div class="panel-card">Seçilen tarihte rezervasyon yok.</div>`}
async function saveOps(id){let st=[document.getElementById("s1_"+id).value,document.getElementById("s2_"+id).value,document.getElementById("s3_"+id).value,document.getElementById("s4_"+id).value].filter(Boolean);if(new Set(st).size!==st.length)return alert("Aynı tezgahtar tekrar seçilemez.");await apiPost("updateReservationOps",{id,exitTime:document.getElementById("exit_"+id).value,kart:document.getElementById("kart_"+id).value,ayak:document.getElementById("ayak_"+id).value,staff1:document.getElementById("s1_"+id).value,staff2:document.getElementById("s2_"+id).value,staff3:document.getElementById("s3_"+id).value,staff4:document.getElementById("s4_"+id).value,status:"UPDATED"});loadAll()}
function editCenter(r){editResId.value=r.id;manualTitle.innerText="Rezervasyon Düzelt";centerHotel.value=r.hotel;centerDate.value=r.date;centerTime.value=r.time;centerExitTime.value=r.exitTime||"";centerAdult.value=r.adult;centerChild.value=r.child;centerNation.value=r.nation;centerNotes.value=r.notes||"";centerKart.value=r.kart||"";centerAyak.value=r.ayak||"";showSection("manual")}
function clearManualForm(){editResId.value="";manualTitle.innerText="Elle Rezervasyon";centerHotel.value="";centerDate.value=today;centerTime.value="10:30";centerExitTime.value="";centerAdult.value=2;centerChild.value=0;centerNation.value="RUS";centerNotes.value="";centerKart.value="";centerAyak.value=""}
async function saveCenterReservation(){let b={id:editResId.value,date:centerDate.value,time:centerTime.value,exitTime:centerExitTime.value,hotel:centerHotel.value,adult:centerAdult.value,child:centerChild.value,nation:centerNation.value,notes:centerNotes.value,kart:centerKart.value,ayak:centerAyak.value,status:editResId.value?"UPDATED":"PENDING"};let r=editResId.value?await apiPost("updateReservation",b):await apiPost("addReservation",b);if(r.success){datePicker.value=b.date;clearManualForm();showSection("home");loadAll()}else alert("Kayıt yapılamadı")}
async function cancelReservation(id){if(confirm("Program iptal edilsin mi?")){await apiGet("cancelReservation",{id});loadAll()}}
async function updateGirdi(id,c){await apiPost("updateReservationOps",{id,girdi:c?"TRUE":"",status:c?"IN_STORE":"PENDING"});loadAll()}
async function updateCikti(id,c){await apiPost("updateReservationOps",{id,cikti:c?"TRUE":"",status:c?"EXITED":"IN_STORE"});loadAll()}
function setReportRange(t){let d=new Date(),s=new Date(d),e=new Date(d);if(t==="week"){let day=d.getDay()||7;s.setDate(d.getDate()-day+1)}if(t==="month"){s=new Date(d.getFullYear(),d.getMonth(),1)}reportStart.value=s.toISOString().slice(0,10);reportEnd.value=e.toISOString().slice(0,10);loadReports()}
function pax(r){return Number(r.adult||0)+Number(r.child||0)}
function countBy(a,f,v=()=>1){let m={};a.forEach(x=>{let k=f(x)||"BOŞ";m[k]=(m[k]||0)+v(x)});return m}
function topKey(m){let b="",v=-1;Object.entries(m).forEach(([k,n])=>{if(n>v){b=k;v=n}});return b?`${b} (${v})`:"-"}
function bars(m){let max=Math.max(1,...Object.values(m));return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="bar-row"><div class="bar-label"><span>${esc(k)}</span><b>${v}</b></div><div class="bar"><div class="bar-fill" style="width:${Math.max(4,v/max*100)}%"></div></div></div>`).join("")||"Veri yok"}
async function loadReports(){let data=await apiGet("getReservationsRange",{start:reportStart.value,end:reportEnd.value});let active=data.filter(r=>r.status!=="CANCELLED"),hotel=countBy(active,r=>r.hotel),nation=countBy(active,r=>r.nation),days=countBy(active,r=>r.date),hours=countBy(active,r=>r.time),staffM={};active.forEach(r=>[r.staff1,r.staff2,r.staff3,r.staff4].filter(Boolean).forEach(s=>{if(!staffM[s])staffM[s]={seans:0,pax:0};staffM[s].seans++;staffM[s].pax+=pax(r)}));reportOut.innerHTML=`<div class="panel-card report-grid"><div class="stat-card"><div class="stat-val">${active.length}</div><div class="stat-lbl">Toplam Rezervasyon</div></div><div class="stat-card"><div class="stat-val">${active.reduce((a,b)=>a+pax(b),0)}</div><div class="stat-lbl">Toplam PAX</div></div><div class="stat-card"><div class="stat-val" style="font-size:18px">${topKey(hotel)}</div><div class="stat-lbl">En Yoğun Otel</div></div><div class="stat-card"><div class="stat-val" style="font-size:18px">${topKey(hours)}</div><div class="stat-lbl">En Kalabalık Saat</div></div></div><div class="grid grid2"><div class="panel-card"><h3>Uyruk Dağılımı</h3>${bars(nation)}</div><div class="panel-card"><h3>Otel Dağılımı</h3>${bars(hotel)}</div></div><div class="grid grid2"><div class="panel-card"><h3>Günlük Trend</h3>${bars(days)}</div><div class="panel-card"><h3>Personel Performans</h3><table><thead><tr><th>Personel</th><th>Seans</th><th>PAX</th></tr></thead><tbody>${Object.entries(staffM).sort((a,b)=>b[1].seans-a[1].seans).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v.seans}</td><td>${v.pax}</td></tr>`).join("")||"<tr><td colspan=3>Veri yok</td></tr>"}</tbody></table></div></div>`}
function exportTodayXls(){let heads=["ACENTAKOD","DATE","TIME","EXIT_TIME","HOTEL","PAX_ADULT","PAX_CHILD","NATION","NOTES","STATUS","KART","AYAK","TEZGAHTAR_1","TEZGAHTAR_2","TEZGAHTAR_3","TEZGAHTAR_4","GIRDI","CIKTI"];let rows=reservations.map(r=>[r.agentCode||"",r.date,r.time,r.exitTime||"",r.hotel,r.adult,r.child,r.nation,r.notes||"",r.status||"",r.kart||"",r.ayak||"",r.staff1||"",r.staff2||"",r.staff3||"",r.staff4||"",r.girdi||"",r.cikti||""]);let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>sayfa1</x:Name><x:WorksheetOptions></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml></head><body><table border="1"><tr>${heads.map(h=>`<th>${h}</th>`).join("")}</tr>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</table></body></html>`;let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([html],{type:"application/vnd.ms-excel"}));a.download=`piano_deri_program_${datePicker.value}.xls`;a.click()}
loadAll();setInterval(loadAll,15000);
</script></body></html>
